version: 2
updates:
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "daily"
      time: "10:00" # (UTC)
    
    labels:
      - "dependabot"

    commit-message:
      prefix: "chore"
      include: "scope"

    groups:
      bun-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
      time: "10:00" # (UTC)
    
    labels:
      - "dependabot"

    commit-message:
      prefix: "chore"
      include: "scope"

    groups:
      docker-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "10:00" # (UTC)
    
    labels:
      - "dependabot"

    commit-message:
      prefix: "chore"
      include: "scope"

    groups:
      docker-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
