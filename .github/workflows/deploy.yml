on:
  workflow_call:
    secrets:
      COOLIFY_API_TOKEN:
        required: true
      COOLIFY_API_URL:
        required: true
      COOLIFY_APP_UUID:
        required: true
    inputs:
      tag:
        required: true
        type: string
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=${{ inputs.tag }}
            type=raw,value=latest
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
  notify-coolify:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - run: |
          curl -X PATCH "${{ secrets.COOLIFY_API_URL }}/api/v1/applications/${{ secrets.COOLIFY_APP_UUID }}" \
               -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
               -H "Content-Type: application/json" \
               -d "{\"docker_registry_image_tag\":\"${{ inputs.tag }}\"}" \
      - run: |
          curl -X POST "${{ secrets.COOLIFY_API_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_APP_UUID }}&force=false" \
               -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
env:
  REGISTRY: ghcr.io
